<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Cup Tunnel</title>
  <style>
    :root {
      --blue: #3457f4;
      --sky: #82b0ef;
      --navy: #202b91;
      --lime: #b8ef00;
      --green: #09c967;
      --teal: #005c4e;
      --orange: #ff4b0b;
      --red: #e60000;
      --maroon: #8e1111;
      --white: #ffffff;
      --gold: #d3a43c;
      --dark-gold: #8b5e16;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--blue);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    .poster {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: var(--blue);
      isolation: isolate;
    }

    .stripe {
      position: absolute;
      inset: auto auto 0 50%;
      width: 18.5%;
      height: 100%;
      transform-origin: 50% 50%;
      border-radius: 86px 86px 0 0;
    }

    .top {
      bottom: 46%;
      transform-origin: 50% 100%;
    }

    .bottom {
      top: 46%;
      bottom: auto;
      transform-origin: 50% 0;
    }

    .stripe::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: currentColor;
    }

    .l-6 { color: var(--sky); transform: translateX(-50%) rotate(-90deg) translateY(400%); width: 24%; }
    .l-5 { color: var(--maroon); transform: translateX(-50%) rotate(-90deg) translateY(300%); width: 21%; }
    .l-4 { color: var(--red); transform: translateX(-50%) rotate(-90deg) translateY(226%); }
    .l-3 { color: var(--orange); transform: translateX(-50%) rotate(-90deg) translateY(160%); }
    .l-2 { color: var(--teal); transform: translateX(-50%) rotate(-90deg) translateY(92%); }
    .l-1 { color: var(--green); transform: translateX(-50%) rotate(-90deg) translateY(38%); }
    .c-0 { color: var(--lime); transform: translateX(-50%) rotate(-90deg) translateY(-16%); }
    .r-1 { color: var(--navy); transform: translateX(-50%) rotate(-90deg) translateY(-72%); }
    .r-2 { color: var(--white); transform: translateX(-50%) rotate(-90deg) translateY(-124%); }

    .bottom.l-6 { transform: translateX(-50%) rotate(90deg) translateY(400%); }
    .bottom.l-5 { transform: translateX(-50%) rotate(90deg) translateY(300%); }
    .bottom.l-4 { transform: translateX(-50%) rotate(90deg) translateY(226%); }
    .bottom.l-3 { transform: translateX(-50%) rotate(90deg) translateY(160%); }
    .bottom.l-2 { transform: translateX(-50%) rotate(90deg) translateY(92%); }
    .bottom.l-1 { transform: translateX(-50%) rotate(90deg) translateY(38%); }
    .bottom.c-0 { transform: translateX(-50%) rotate(90deg) translateY(-16%); }
    .bottom.r-1 { transform: translateX(-50%) rotate(90deg) translateY(-72%); }
    .bottom.r-2 { transform: translateX(-50%) rotate(90deg) translateY(-124%); }

    .field {
      position: absolute;
      inset: 0;
      z-index: 2;
      perspective: 820px;
      transform-style: preserve-3d;
    }

    .portal {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 82%;
      aspect-ratio: 1.72;
      transform: translate(-50%, -50%);
      border-radius: 112px;
      background: transparent;
    }

    .ring {
      position: absolute;
      inset: var(--gap);
      border: var(--thick) solid var(--color);
      border-radius: var(--radius);
    }

    .ring:nth-child(1) { --gap: -98px; --thick: 72px; --radius: 156px; --color: var(--lime); transform: translate(214px, -166px) rotate(0deg); }
    .ring:nth-child(2) { --gap: -50px; --thick: 67px; --radius: 134px; --color: var(--navy); transform: translate(138px, -108px); }
    .ring:nth-child(3) { --gap: -5px; --thick: 62px; --radius: 110px; --color: var(--sky); transform: translate(88px, -60px); }
    .ring:nth-child(4) { --gap: 42px; --thick: 59px; --radius: 88px; --color: var(--maroon); transform: translate(44px, -22px); }
    .ring:nth-child(5) { --gap: 83px; --thick: 54px; --radius: 70px; --color: var(--red); transform: translate(2px, 2px); }
    .ring:nth-child(6) { --gap: 121px; --thick: 49px; --radius: 56px; --color: var(--orange); transform: translate(-26px, 18px); }
    .ring:nth-child(7) { --gap: 158px; --thick: 45px; --radius: 42px; --color: var(--teal); transform: translate(-48px, 26px); }
    .ring:nth-child(8) { --gap: 190px; --thick: 39px; --radius: 30px; --color: var(--green); transform: translate(-64px, 28px); }
    .ring:nth-child(9) { --gap: 220px; --thick: 32px; --radius: 19px; --color: var(--lime); transform: translate(-74px, 22px); }
    .ring:nth-child(10) { --gap: 244px; --thick: 24px; --radius: 13px; --color: var(--navy); transform: translate(-80px, 13px); }

    .sweep {
      position: absolute;
      left: 50%;
      top: 0;
      z-index: 4;
      width: 49%;
      aspect-ratio: 1.2;
      transform: translate(-18%, -47%) rotate(135deg);
      border-radius: 160px;
      background:
        radial-gradient(closest-side, transparent 43%, var(--navy) 44% 55%, var(--lime) 56% 66%, var(--green) 67% 77%, var(--teal) 78% 89%, var(--orange) 90% 100%);
    }

    .sweep::before {
      content: "";
      position: absolute;
      inset: -18%;
      border-radius: inherit;
      z-index: -1;
    }

    .sweep::before {
      background:
        radial-gradient(closest-side, transparent 58%, var(--red) 59% 70%, var(--maroon) 71% 82%, var(--sky) 83% 93%, transparent 94%);
    }

    .badge {
      position: absolute;
      left: 50%;
      top: 54%;
      z-index: 6;
      width: 18.5%;
      min-width: 142px;
      aspect-ratio: .72;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: end center;
      padding-bottom: 0;
      border-radius: 25% / 18%;
      background: var(--white);
      box-shadow: 0 0 0 41px var(--navy);
    }

    .badge::before,
    .badge::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 76%;
      height: 29%;
      transform: translateX(-50%);
      background: var(--white);
    }

    .badge::before {
      top: -10%;
      border-radius: 44% 44% 31% 31%;
      box-shadow: 0 -24px 0 17px var(--navy);
    }

    .badge::after {
      bottom: -10%;
      border-radius: 31% 31% 44% 44%;
      box-shadow: 0 24px 0 17px var(--navy);
    }

    .letter-b {
      position: absolute;
      left: 54%;
      top: 50%;
      z-index: 0;
      width: 60%;
      height: 15%;
      transform: translate(-50%, -50%);
      background: var(--white);
      border-radius: 2px;
      box-shadow: 30px 0 0 var(--navy);
    }

    .trophy {
      position: absolute;
      left: 50%;
      top: 37%;
      width: 44%;
      height: 44%;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 4px 2px rgba(67, 39, 3, .34));
      z-index: 3;
    }

    .cup {
      position: absolute;
      left: 50%;
      top: 1%;
      width: 45%;
      height: 43%;
      transform: translateX(-50%);
      border-radius: 48% 52% 45% 55%;
      background:
        radial-gradient(circle at 32% 29%, #fff5c1 0 10%, transparent 12%),
        radial-gradient(circle at 68% 38%, #6b3e0b 0 11%, transparent 12%),
        linear-gradient(115deg, #5f3908 0 8%, #f8d46b 18% 31%, #9b690f 42%, #fff1a8 55%, #95620d 76%, #4d2b06 100%);
      box-shadow: inset 5px 0 10px rgba(255, 244, 172, .7), inset -8px -4px 12px rgba(67, 39, 3, .48);
    }

    .cup::before,
    .cup::after {
      content: "";
      position: absolute;
      top: 24%;
      width: 45%;
      height: 44%;
      border: 9px solid #b88422;
      border-top-color: transparent;
      border-radius: 50%;
      z-index: -1;
    }

    .cup::before {
      left: -33%;
      transform: rotate(24deg);
    }

    .cup::after {
      right: -33%;
      transform: rotate(-24deg);
    }

    .stem {
      position: absolute;
      left: 50%;
      top: 35%;
      width: 25%;
      height: 43%;
      transform: translateX(-50%) skewX(-13deg);
      border-radius: 42% 46% 22% 23%;
      background: linear-gradient(112deg, #5e3506 0 12%, #e8be52 28%, #8a5b0f 52%, #fbe48d 70%, #704408 100%);
    }

    .base {
      position: absolute;
      left: 50%;
      bottom: 5%;
      width: 58%;
      height: 17%;
      transform: translateX(-50%);
      clip-path: polygon(25% 0, 75% 0, 95% 100%, 5% 100%);
      background:
        linear-gradient(to bottom, var(--gold), #9d6916 44%, #075243 45% 70%, #c89626 71% 100%);
    }

    .fifa {
      position: absolute;
      left: 50%;
      bottom: 12%;
      z-index: 4;
      transform: translateX(-50%);
      color: #050505;
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 900;
      letter-spacing: .02em;
      line-height: .8;
    }

    .tm {
      position: absolute;
      right: 32.5%;
      bottom: 19%;
      z-index: 7;
      color: var(--navy);
      font-size: clamp(8px, 1vw, 12px);
      font-weight: 700;
    }

    @media (max-width: 720px) {
      .poster {
        width: 100vw;
      }

      .stripe {
        border-radius: 48px 48px 0 0;
      }

      .letter-b {
        border-width: 42px;
      }

      .badge {
        min-width: 112px;
      }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="Colorful World Cup inspired tunnel artwork">
    <div class="stripe top l-6"></div>
    <div class="stripe top l-5"></div>
    <div class="stripe top l-4"></div>
    <div class="stripe top l-3"></div>
    <div class="stripe top l-2"></div>
    <div class="stripe top l-1"></div>
    <div class="stripe top c-0"></div>
    <div class="stripe top r-1"></div>
    <div class="stripe top r-2"></div>
    <div class="stripe bottom l-6"></div>
    <div class="stripe bottom l-5"></div>
    <div class="stripe bottom l-4"></div>
    <div class="stripe bottom l-3"></div>
    <div class="stripe bottom l-2"></div>
    <div class="stripe bottom l-1"></div>
    <div class="stripe bottom c-0"></div>
    <div class="stripe bottom r-1"></div>
    <div class="stripe bottom r-2"></div>

    <section class="field" aria-hidden="true">
      <div class="portal">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
    </section>

    <div class="sweep" aria-hidden="true"></div>
    <div class="badge" aria-label="FIFA World Cup inspired mark">
      <div class="letter-b" aria-hidden="true"></div>
      <div class="trophy" aria-hidden="true">
        <div class="cup"></div>
        <div class="stem"></div>
        <div class="base"></div>
      </div>
      <div class="fifa">FIFA</div>
    </div>
    <div class="tm" aria-hidden="true">TM</div>
  </main>
</body>
</html>
